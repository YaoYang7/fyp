server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Allow large file uploads (backend accepts up to 500 MB)
    client_max_body_size 510m;

    # Cache hashed static assets (JS/CSS from Vite build)
    location ~* \.(js|css|png|jpg|jpeg|gif|webp|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # SPA fallback — all other routes serve index.html for React Router
    # NOTE: /api/, /user_api/, /uploads/ are handled by the lb container upstream
    location / {
        try_files $uri $uri/ /index.html;
    }
}
