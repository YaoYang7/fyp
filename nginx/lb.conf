# Docker's embedded DNS — re-resolve every 5 s so new/removed backend containers
# are picked up automatically without an nginx reload.
resolver 127.0.0.11 valid=5s ipv6=off;

server {
    listen 80;
    server_name _;
    client_max_body_size 510m;

    # -------------------------------------------------------------------------
    # Internal routing subrequest — NOT publicly accessible.
    # Nginx calls this via auth_request before proxying API requests.
    # The router decodes the JWT, looks up the tenant's assigned backend, and
    # returns it in the X-Upstream response header.
    # -------------------------------------------------------------------------
    location = /_route {
        internal;
        proxy_pass              http://router:8080/route;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length   "";
        proxy_set_header        Authorization    $http_authorization;
        proxy_set_header        X-Token          $arg_token;
    }

    location /api/ {
        auth_request     /_route;
        auth_request_set $upstream_host $upstream_http_x_upstream;

        set $routed $upstream_host;
        if ($routed = "") {
            set $routed "vm1:8000";
        }

        proxy_pass         http://$routed;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_request_buffering off;
        add_header X-Served-By $upstream_addr always;
    }

    location /user_api/ {
        auth_request     /_route;
        auth_request_set $upstream_host $upstream_http_x_upstream;

        set $routed $upstream_host;
        if ($routed = "") {
            set $routed "vm1:8000";
        }

        proxy_pass         http://$routed;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header X-Served-By $upstream_addr always;
    }

    location /uploads/ {
        auth_request     /_route;
        auth_request_set $upstream_host $upstream_http_x_upstream;

        set $routed $upstream_host;
        if ($routed = "") {
            set $routed "vm1:8000";
        }

        proxy_pass         http://$routed;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        add_header X-Served-By $upstream_addr always;
    }

    location /lb-health {
        access_log off;
        return 200 "lb-ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        proxy_pass         http://frontend:80/;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
}
