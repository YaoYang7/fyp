version: "3.9"

services:
  # PostgreSQL database
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: blogdb
      POSTGRES_USER: bloguser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - blog_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bloguser -d blogdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # VM 1 — medium VM (1.0 CPU, 1 GB RAM, 2 workers)
  vm1:
    build:
      context: ./blog-app/backend
      dockerfile: Dockerfile
    image: blog-backend:latest          # tag the built image so autoscaler can reuse it
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://bloguser:${POSTGRES_PASSWORD}@postgres:5432/blogdb
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      INSTANCE_ID: vm1
      UVICORN_WORKERS: "2"
    volumes:
      - uploads_data:/app/uploads
    networks:
      blog_net:
        aliases:
          - backend                     # Docker DNS alias kept for burst container compatibility
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 1024M
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # VM 2 — medium VM (1.0 CPU, 1 GB RAM, 2 workers)
  vm2:
    image: blog-backend:latest          # reuses the image built by vm1 — no duplicate build
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      vm1:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://bloguser:${POSTGRES_PASSWORD}@postgres:5432/blogdb
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      INSTANCE_ID: vm2
      UVICORN_WORKERS: "2"
    volumes:
      - uploads_data:/app/uploads
    networks:
      blog_net:
        aliases:
          - backend
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 1024M
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # Router — tenant-aware routing service used by Nginx auth_request
  router:
    build:
      context: ./blog-app/router
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://bloguser:${POSTGRES_PASSWORD}@postgres:5432/blogdb
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DEFAULT_BACKEND: "vm1:8000"
    networks:
      - blog_net
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 15s
      timeout: 3s
      retries: 3

  # Autoscaler — monitors CPU and spawns/removes burst containers automatically
  autoscaler:
    build:
      context: ./blog-app/autoscaler
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      vm1:
        condition: service_healthy
      vm2:
        condition: service_healthy
      router:
        condition: service_healthy
    environment:
      CPU_THRESHOLD: "70"
      MEM_THRESHOLD: "80"
      BW_THRESHOLD: "50"
      DISK_IO_THRESHOLD: "50"
      SCALE_DOWN_THRESHOLD: "30"
      SCALE_DOWN_COOLDOWN: "60"
      CHECK_INTERVAL: "10"
      MAX_BURST: "3"
      NETWORK_NAME: "fyp_blog_net"
      UPLOADS_VOLUME: "fyp_uploads_data"
      BURST_IMAGE: "blog-backend:latest"
      DATABASE_URL: postgresql://bloguser:${POSTGRES_PASSWORD}@postgres:5432/blogdb
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      ROUTER_URL: "http://router:8080"
      PROFILE_CHECK_INTERVAL: "120"
      TENANT_CPU_HEAVY: "80"
      SEPARATION_INTERVAL: "30"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # Docker API access
    networks:
      - blog_net

  # React frontend served by nginx (static files only — lb handles API routing)
  frontend:
    build:
      context: ./blog-app/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    restart: unless-stopped
    networks:
      - blog_net

  # Nginx load balancer — the only externally-exposed service
  lb:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      vm1:
        condition: service_healthy
      vm2:
        condition: service_healthy
      frontend:
        condition: service_started
      router:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/lb.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - blog_net

volumes:
  postgres_data:
  uploads_data:

networks:
  blog_net:
    driver: bridge
